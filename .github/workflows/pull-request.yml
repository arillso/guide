---
name: Pull Request
run-name: |
    Pull Request by @${{ github.actor }}

on:
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened, ready_for_review]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    actions: read
    pull-requests: write
    issues: read
    id-token: write

jobs:
    build-docs:
        name: Build Documentation
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: Setup Python
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
              with:
                  python-version: "3.14.6"
                  cache: "pip"

            - name: Install Dependencies
              run: pip install -r requirements.txt

            - name: Build Documentation
              run: ./build.sh

            # Reuse the rst/ tree that build.sh already generated (collections
            # rendered + normalized) and validate every external link. Internal
            # :ref:/:doc: references are already enforced by the nitpicky html
            # build above; this catches dead external URLs.
            - name: Check Links
              run: sphinx-build -b linkcheck rst build/linkcheck -c .

    security-secrets:
        name: Secret Detection Scan
        uses: arillso/.github/.github/workflows/security-secrets.yml@2026-06-14

    claude-review:
        name: Claude Code Review
        uses: arillso/.github/.github/workflows/ai-claude-review.yml@2026-06-14
        secrets:
            CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
